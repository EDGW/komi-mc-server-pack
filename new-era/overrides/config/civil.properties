# Civil mod configuration
# Simple settings are used by the in-game GUI.
# Advanced (raw) settings override simple-computed values if uncommented.

# ── Diagnostics ──
tpsLog.enabled=true
tpsLog.intervalTicks=20

# ── Simple Settings (GUI) ──
simple.freshnessDuration=6
decay.enabled=true
simple.decaySpeed=5
simple.decayFloor=25
simple.recoverySpeed=5
simple.spawnSuppression=5
simple.detectionRange=240
simple.shrineSuppressStrength=5
simple.shrineSuppressRange=8
simple.patrolRange=4

# ── Aura Visualization ──
aura.enabled=true
# Civil undying anchor save (teleport + totem on near-death)
undyingAnchor.enabled=true
# 0.8 = 80%% toward full score from greenLine; see getUndyingAnchorCivRequired()
undyingAnchor.civRatio=0.8
undyingAnchor.globalCooldownSeconds=10
undyingAnchor.maxSearchRadius=128

# ── Sonar System ──
sonar.detectorEnabled=true
sonar.detectorRadius=5
sonar.staticRadius=10
#sonar.staticCooldownTicks=40

# ── Advanced: Decay & Recovery (uncomment to override) ──
#decay.gracePeriodHours=6.0
#decay.lambda=0.008004468914296353
#decay.minFloor=0.25
#recovery.cooldownMs=73333
#recovery.fraction=0.25
#recovery.minMs=2266667

# ── Advanced: Spawn Thresholds ──
#spawn.thresholdLow=0.13703703703703704
#spawn.thresholdMid=0.41111111111111115

# ── Advanced: Scoring ──
#scoring.sigmoidMid=0.8
#scoring.sigmoidSteepness=3.0
#scoring.distanceAlphaSq=0.5
#scoring.normalizationFactor=5.0

# ── Advanced: Detection Ranges (voxel chunks) ──
#range.detectionRadiusX=7
#range.detectionRadiusZ=7
#range.detectionRadiusY=1
#range.coreRadiusX=1
#range.coreRadiusZ=1
#range.coreRadiusY=0
#range.farmShrineRangeX=1
#range.farmShrineRangeZ=1
#range.farmShrineRangeY=0

# ── Advanced: Farm shrine spawn suppression ──
#farmShrine.attractMaxRadius=128.0
#farmShrine.attractLambda=0.15

# ── Advanced: Cache & Performance ──
#cache.l1TtlMs=300000
#cache.resultTtlMs=3600000
#cache.clockPersistTicks=6000

# ── Advanced: Result prefetch (zone HUD epoch pipeline) ──
#prefetch.requiredCountEnter=10
#prefetch.requiredCountLeave=10
#prefetch.resultBudgetPerTick=1000
#prefetch.resultEpochTtlSec=2
#prefetch.presenceRawEpsilon=0.01
#prefetch.zoneReceiptStrongCivilizedRatio=0.9998301886792453   # strict = mid + (1-mid)*ratio; civilizedCount uses strict; center uses spawn.thresholdMid

# ── Mob Flee AI ──
mobFlee.enabled=true
#mobFlee.combatFleeRatio=0.5
#mobFlee.checkIntervalTicks=80
#mobFlee.jitterTicks=40
#mobFlee.panicDurationTicks=80
#mobFlee.maxDurationTicks=200
#mobFlee.speed=1.0
#mobFlee.sampleDistance=14

# ── Advanced: UI ──
ui.zoneTransitionHudEnabled=true
ui.zoneTransitionLabel.civilized=
ui.zoneTransitionLabel.wilderness=
ui.zoneTransitionLabel.caution=
ui.zoneTransitionHudCooldownSeconds=10
ui.zoneTransitionHudAnchorOffsetXPercent=0
ui.zoneTransitionHudAnchorOffsetYPercent=30
#ui.detectorAnimationTicks=40
#ui.detectorCooldownTicks=10

# ── Chunk-band sync (JourneyMap / Xaero overlays) ──
chunkBand.syncEnabled=true
chunkBand.radiusChunks=4
chunkBand.intervalTicks=20
chunkBand.clientEnabled.journeymap=false
chunkBand.clientEnabled.xaeros=false

# ── Advanced: Civil map tint (0-255; baked server-side) ──
#mapTint.highFillAlpha=65
#mapTint.highEdgeAlpha=150  # border: uniform white mix, not terrain-based
#mapTint.monsterFillAlpha=60
#mapTint.monsterEdgeAlpha=145  # border: uniform purple mix
